name: Build iOS wrapper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npm run cap:sync

      - name: Compile iOS app for simulator
        working-directory: ios/App
        run: xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphonesimulator build
